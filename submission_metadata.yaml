ai_usage_summary: |
  ChatGPT was used as an engineering assistant throughout the project for
  architecture discussions, implementation guidance, debugging support,
  documentation, code review, and project organization.

  All ranking logic, feature engineering, retrieval strategy, reranking
  pipeline, scoring methodology, and project integration were implemented
  and validated by the team. No hosted LLM APIs or external AI services are
  used during the candidate ranking stage.

# ============================================================================
# Methodology Summary
# ============================================================================

methodology_summary: |
  We developed a fully offline AI-powered candidate ranking system designed
  for large-scale recruitment. The pipeline begins with dataset auditing,
  schema validation, duplicate detection, and candidate quality assessment.

  A structured Job Description (JD Compass) is created by extracting role
  requirements, mandatory skills, preferred skills, experience expectations,
  and scoring dimensions.

  Candidate profiles are parsed into structured representations using
  extensive feature engineering covering professional experience, education,
  certifications, technical skills, recruiter engagement metrics, GitHub
  activity, profile completeness, notice period, and other hiring signals.

  Candidate retrieval combines BM25 lexical search with dense semantic
  retrieval using the BAAI/bge-small-en-v1.5 embedding model. The two
  retrieval methods are fused using Reciprocal Rank Fusion (RRF) to maximize
  recall.

  Retrieved candidates are reranked using the
  cross-encoder/ms-marco-MiniLM-L-6-v2 Cross Encoder, enabling deep semantic
  matching between candidate profiles and the job description.

  Finally, concise evidence-based reasoning is generated for each shortlisted
  candidate, normalized scores are assigned, and the final ranked submission
  CSV is produced.

  Heavy computations such as embedding generation and indexing are performed
  offline during preprocessing, allowing the final ranking stage to execute
  efficiently on CPU without requiring internet connectivity.

